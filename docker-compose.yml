version: '3.8'

services:
  frontend:
    build: ./tour-application-fe
    container_name: tour_frontend
#    ports:
#      - "5173:80"
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - tour_network
    deploy:
      resources:
        limits:
          memory: 150M

  backend:
    build: ./TourApplication
#    ports:
#      - "8080:8080"
    restart: unless-stopped
    depends_on:
      - redis
      - postgres
      - rabbitmq
    environment:
      JAVA_TOOL_OPTIONS: "-Xmx512m -Xms256m"
      DB_POSTGRES_USER: ${DB_POSTGRES_USER}
      DB_POSTGRES_PASSWORD: ${DB_POSTGRES_PASSWORD}
      APP_BACKEND_URL: ${APP_BACKEND_URL}
      APP_FRONTEND_URL: ${APP_FRONTEND_URL}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY}
      VNPAY_HASH_SECRET: ${VNPAY_HASH_SECRET}
      SPRING_MAIL_HOST: smtp-relay.brevo.com
      SPRING_MAIL_PORT: 2525
      SPRING_MAIL_USERNAME: a51a57001@smtp-brevo.com
      SPRING_MAIL_PASSWORD: ${SMTP_KEY}
      APP_EMAIL_FROM: dangtieulong362@gmail.com
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH: "true"
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE: "true"
      DB_POSTGRES_HOST: tour_postgres
      REDIS_HOST: tour_redis
      RABBIT_HOST: tour_rabbitmq
    networks:
      - tour_network
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 700M

  api_load_balancer:
    image: nginx:latest
    container_name: nginx_lb
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    networks:
      - tour_network

  postgres:
    image: ankane/pgvector:latest
    container_name: tour_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: tlong1312@1312
      POSTGRES_DB: vector_db
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - tour_network
    deploy:
      resources:
        limits:
          memory: 350M

  redis:
    image: redis:latest
    container_name: tour_redis
    restart: unless-stopped
    command: ["redis-server", "--maxmemory", "100mb", "--maxmemory-policy", "allkeys-lru"]
    ports:
      - "6380:6379"
    networks:
      - tour_network
    deploy:
      resources:
        limits:
          memory: 150M

  rabbitmq:
    image: rabbitmq:3-management
    container_name: tour_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=tour_admin
      - RABBITMQ_DEFAULT_PASS=tour_password
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    restart: always
    networks:
      - tour_network

volumes:
  postgres_data:
  rabbitmq_data:

networks:
  tour_network:
    driver: bridge
