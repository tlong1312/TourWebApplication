events {
    worker_connections 1024;
}

http {
    # Khai báo cụm server backend (Tên 'tour_backend' phải khớp với tên service trong docker-compose)
    upstream backend_cluster {
        server backend:8080;
    }

    server {
        listen 80; # Mở cổng 80 cho Nginx Load Balancer

        location / {
            # Điều hướng mọi luồng traffic vào cụm cluster ở trên
            proxy_pass http://backend_cluster;

            # Giữ nguyên thông tin của người dùng thật (rất quan trọng cho thanh toán VNPay)
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}